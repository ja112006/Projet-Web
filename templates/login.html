{% extends "layout.html" %}

{% block title %}Connexion - RDV Université{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2>Connexion</h2>
        
        <form method="POST" action="{{ url_for('login') }}" id="login-form">
            <div class="form-group">
                <label for="email">Email universitaire</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="votre.email@univ-amu.fr"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="*******"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
        </form>

        <p class="auth-link">
            Pas encore de compte ? 
            <a href="{{ url_for('signup') }}">Créer un compte</a>
        </p>
    </div>
</div>
{% endblock %}
